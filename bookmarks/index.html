<!DOCTYPE html>
<html dir="ltr" lang="en-us">

<head>
    <meta charset="utf-8" />
    <title>My Bookmarks</title>
    <link rel="stylesheet" href="css/bookmarks.css" />
</head>

<body>
    <div class="container">
        <div class="row text-center">
            <div class="col-md-12">
                <h1>My Bookmarks</h1>
            </div>
        </div>
        <div class="row text-center">
            <div class="col-md-12">
                <div id="msg" class="message error" role="alert" aria-live="polite" aria-atomic="true"></div>
            </div>
        </div>
        <div class="container search" id="search_screen">
            <div class="row">
                <div class="col-md-12 input-container">
                    <label for="search_text">Search Bookmarks</label>
                    <input type="text" id="search_text" placeholder="Search Bookmarks" class="clearable-input"/>
                    <button id="clear_search_text" class="clear-btn" aria-label="Clear search">✖</button><br />
                </div>
            </div>
            <div class="row">
                <div id="search_results" class="search_results" role="region" aria-live="polite" aria-label="Search results"></div>
            </div>
        </div>
    </div>
    <div class="container outer" id="bookmarks_screen">
        <div class="row tabs_row">
            <div class="col-12 flex_full_width">
                <div class="left_div">
                    <button type="button" id="lefttab" aria-label="Scroll tabs left">&lt;</button>
                </div>
                <div class="right_div">
                    <button type="button" id="righttab" aria-label="Scroll tabs right">&gt;</button>
                    <button type="button" id="tabcommands" aria-label="Open tab menu">&#8230;</button>
                </div>
                <div class="middle_div" id="tabs_panel" role="tablist" aria-label="Bookmark tabs">
                    <ul id="tabs">
                    </ul>
                </div>
            </div>
        </div>
        <div class="row flex_row">
            <div class="col-md-9 scrollV bookmarks">
                <ul id="bookmarks-parent"></ul>
            </div>
        </div>
    </div>

    <!-- Context Menu - Tabs -->
    <div id="tabsCommandMenu" class="context_menu" style="display: none" role="menu" aria-label="Tab actions menu">
        <div class="menu_wrapper">
            <button command="tab_add" role="menuitem"> Add Tab </button>
            <button command="bookmark_add" role="menuitem"> Add Bookmark </button>
            <hr role="separator">
            <button command="tab_rename" role="menuitem"> Rename Selected Tab </button>
            <button command="tab_remove" role="menuitem"> Remove Selected Tab </button>
            <hr role="separator">
            <button command="tab_move_left" role="menuitem"> Move Selected Tab Left &lt; </button>
            <button command="tab_move_right" role="menuitem"> Move Selected Tab Right &gt; </button>
            <hr role="separator">
            <button command="printview" role="menuitem"> Print Tab </button>
            <hr role="separator">
            <button command="export" role="menuitem"> Export Data to a File </button>
            <button command="import" role="menuitem"> Import Data from a File </button>
            <button command="merge_import" role="menuitem"> Merge Import Data </button>
            <button command="edit_data" role="menuitem"> Edit Raw Data </button>
            <hr role="separator">
            <button command="clear" role="menuitem"> Delete All Bookmarks and Tabs </button>
        </div>
    </div>
    <!-- END: Context Menu - Tabs -->

    <!-- Context Menu - Bookmarks -->
    <div id="bookmarksCommandMenu" class="context_menu" style="display: none" role="menu" aria-label="Bookmark actions menu">
        <div class="menu_wrapper">
            <button command="bookmark_edit" role="menuitem"> Edit Bookmark </button>
            <hr role="separator">
            <button command="bookmark_add_child" role="menuitem"> Add Child </button>
            <button command="bookmark_add_sibling" role="menuitem"> Add Sibling </button>
            <hr role="separator">
            <button command="bookmark_delete" role="menuitem"> Delete Bookmark </button>
        </div>
    </div>
    <!-- END: Context Menu - Bookmarks -->

    <!-- Overlay -->
    <div id="dialog_overlay" aria-hidden="true"></div>
    <!-- Dialog - Edit Tab -->
    <div id="dialog_tab_edit" class="dialog_box" role="dialog" aria-modal="true" aria-labelledby="dialog_tab_title" style="display: none;">
        <div class="dialog_title" id="dialog_tab_title">Add Tab</div>
        <div class="dialog_content">
            <input type="hidden" id="dialog_tab_id" />
            <div class="message error">Failed to Load</div>
            <div>
                <label for="dialog_tab_edit_title">Title</label><br />
                <input type="text" id="dialog_tab_edit_title" />
            </div>
            <button class="button_save" type="button" command="tab_save">Save</button>
            <button class="button_cancel" type="button">Cancel</button>
        </div>
    </div>
    <!-- END: Dialog - Edit Tab -->

    <!-- Dialog - Edit Bookmark -->
    <div id="dialog_bookmark_edit" class="dialog_box" role="dialog" aria-modal="true" aria-labelledby="dialog_bookmark_title" style="display: none;">
        <div class="dialog_title" id="dialog_bookmark_title">Add Bookmark</div>
        <div class="dialog_content">
            <input type="hidden" id="dialog_bookmark_id" />
            <input type="hidden" id="dialog_bookmark_tab_id" />
            <input type="hidden" id="dialog_bookmark_parent_id" />

            <div class="message error">Failed to Load</div>
            <div>
                <label for="dialog_bookmark_edit_title">Title</label><br />
                <input type="text" id="dialog_bookmark_edit_title" />
            </div>
            <div>
                <label for="dialog_bookmark_edit_url">URL</label><br />
                <input type="text" id="dialog_bookmark_edit_url" />
            </div>
            <div>
                <label for="dialog_bookmark_edit_notes">Notes</label><br />
                <textarea id="dialog_bookmark_edit_notes"></textarea>
            </div>
            <div>
                <input type="checkbox" id="dialog_bookmark_edit_target" />
                <label for="dialog_bookmark_edit_target"> Open in new tab</label>
            </div>
            <div id="dialog_bookmark_edit_showadvanced">
                <a href="#" id="show_advanced_link" aria-expanded="false">Show Advanced</a>
            </div>
            <div id="dialog_bookmark_edit_advanced" style="display:none;">
                <div>
                    <label for="dialog_bookmark_edit_tab">Tab</label><br />
                    <select id="dialog_bookmark_edit_tab"></select>
                </div>
                <div>
                    <label for="dialog_bookmark_edit_parent">Parent Bookmark</label><br />
                    <select id="dialog_bookmark_edit_parent"></select>
                </div>
            </div>
            <button class="button_save" type="button" command="bookmark_save">Save</button>
            <button class="button_cancel" type="button">Cancel</button>
        </div>
    </div>
    <!-- END: Dialog - Edit Bookmark -->

    
    <!-- Edit Data Screen -->
    <div class="container outer" id="bookmark_edit_screen" style="display: none;">
        <div class="row tabs_row">
            <div class="col-12 flex_full_width">
                <h2>Edit Tab and Bookmark Data</h2>
            </div>
        </div>
        <div class="row">
            <div class="col-md-9 scrollV">
                <div class="edit_data_outer">
                    <label for="dialog_bookmark_edit_tabs">Tabs</label><br />
                    <textarea id="dialog_bookmark_edit_tabs" placeholder="JSON for Tabs"></textarea>
                </div>
                <div class="edit_data_outer">
                    <label for="dialog_bookmark_edit_bookmarks">Bookmarks</label><br />
                    <textarea id="dialog_bookmark_edit_bookmarks" placeholder="JSON for Bookmarks"></textarea>
                </div>
                <div class="edit_data_outer">
                    <input type="button" id="dialog_bookmark_edit_save" class="button_save" value="Save" />
                    <input type="button" id="dialog_bookmark_edit_reload" class="button_reload" value="Reload Data" />
                    <input type="button" id="dialog_bookmark_edit_close" class="button_cancel" value="Cancel" />
                </div>
            </div>
        </div>
    </div>

    <!-- Dialog - Merge Import Preview -->
    <div id="dialog_merge_preview" class="dialog_box" role="dialog" aria-modal="true" aria-labelledby="dialog_merge_preview_title" style="display: none;">
        <div class="dialog_title" id="dialog_merge_preview_title">Merge Import Preview</div>
        <div class="dialog_content">
            <div style="margin: 10px 0; padding: 10px; background: #f0f0f0; border-radius: 4px;">
                <strong id="merge_preview_summary">Loading...</strong>
            </div>
            <div style="overflow-y: auto; max-height: 50vh;">
                <div id="merge_preview_content">Loading preview...</div>
            </div>
            <div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #ddd;">
                <button class="button_save" type="button" id="merge_preview_accept">Accept and Merge</button>
                <button class="button_cancel" type="button" id="merge_preview_cancel">Cancel</button>
            </div>
        </div>
    </div>
    <!-- END: Dialog - Merge Import Preview -->

    
    <!-- END: Edit Data Screen -->
</body>

<script src="js/myDragMove.js"></script>
<script src="js/bookmarks.js"></script>

</html>
