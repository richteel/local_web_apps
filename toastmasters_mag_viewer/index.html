<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toastmasters Magazine Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <h1>📚 Toastmasters Magazine Archive</h1>
    <p id="subtitle">Loading magazines...</p>
    <div class="status-stack">
      <p id="thumbStatus" class="status-line"></p>
      <p id="indexStatus" class="status-line"></p>
    </div>
  </div>

  <div class="search-bar">
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input 
        type="text" 
        id="searchInput" 
        class="search-input" 
        placeholder="Search by year, month, or content..."
        autocomplete="off"
      >
      <div class="stats">
        <span id="filteredCount">0</span> of <span id="totalCount">0</span> magazines
      </div>
    </div>
  </div>

  <div class="container">
    <div id="content" class="magazines-grid"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // Configure PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const elements = {
      subtitle: document.getElementById('subtitle'),
      searchInput: document.getElementById('searchInput'),
      content: document.getElementById('content'),
      totalCount: document.getElementById('totalCount'),
      filteredCount: document.getElementById('filteredCount'),
      thumbStatus: document.getElementById('thumbStatus'),
      indexStatus: document.getElementById('indexStatus')
    };

    let magazines = [];
    let isIndexingComplete = false;
    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
                        'July', 'August', 'September', 'October', 'November', 'December'];
    // Listen for indexing progress
    window.electronAPI.onIndexingProgress((data) => {
      updateIndexingStatus(data.current, data.total, data.indexed, data.cached, data.errors);
    });

    window.electronAPI.onIndexingComplete((data) => {
      isIndexingComplete = true;
      elements.indexStatus.textContent = `Indexing complete: ${data.indexed} indexed, ${data.cached} cached, ${data.errors} errors`;
      setTimeout(() => {
        elements.indexStatus.textContent = '';
      }, 5000);
    });

    function updateIndexingStatus(current, total, indexed, cached, errors) {
      if (errors > 0) {
        elements.indexStatus.textContent = `Indexing PDFs... ${current}/${total} (${cached} cached, ${errors} errors)`;
      } else if (cached > 0) {
        elements.indexStatus.textContent = `Indexing PDFs... ${current}/${total} (${cached} cached)`;
      } else {
        elements.indexStatus.textContent = `Indexing PDFs... ${current}/${total}`;
      }
    }


    // Load magazines on startup
    async function loadMagazines() {
      try {
        const result = await window.electronAPI.scanMagazines();
        
        if (!result.success) {
          elements.content.innerHTML = `<div class="error">${result.error}</div>`;
          elements.subtitle.textContent = 'Error loading magazines';
          return;
        }

        magazines = result.magazines;
        
        if (magazines.length === 0) {
          elements.content.innerHTML = '<div class="no-results">No magazines found. Add PDF files to the "magazines" folder.</div>';
          elements.subtitle.textContent = 'No magazines found';
          return;
        }

        elements.subtitle.textContent = `Browse and search ${magazines.length} magazines`;
        elements.totalCount.textContent = magazines.length;
        elements.filteredCount.textContent = magazines.length;
        
        renderMagazineCards(magazines);
        
        // Pass existing thumbnails and indexed files to optimize loading
        const existingThumbnails = new Set(result.existingThumbnails || []);
        const indexedFilenames = new Set(result.indexedFilenames || []);
        
        await loadThumbnails(existingThumbnails);
        
        // Start indexing PDFs - only those not already indexed
        window.electronAPI.startIndexing(magazines, result.indexedFilenames || []);
      } catch (error) {
        console.error('Error loading magazines:', error);
        elements.content.innerHTML = `<div class="error">Error: ${error.message}</div>`;
      }
    }

    function renderMagazineCards(magazinesToShow) {
      elements.content.innerHTML = magazinesToShow.map(mag => {
        const hasDate = Boolean(mag.year && mag.month && mag.startsWithNumber);

        let dateLabel = '';
        if (hasDate) {
          const options = { year: 'numeric', month: 'long' };
          if (mag.day) {
            options.day = 'numeric';
          }
          const safeDay = mag.day || 1; // fallback to keep Date valid
          const d = new Date(mag.year, (mag.month || 1) - 1, safeDay);
          dateLabel = d.toLocaleDateString(undefined, options);
        }

        return `
        <div class="magazine-card" data-filename="${mag.filename}">
          <div class="thumbnail-container">
            <div class="thumbnail-placeholder">📄</div>
            <canvas class="thumbnail-canvas" data-pdf="${mag.filename}"></canvas>
          </div>
          <div class="magazine-info">
            ${hasDate ? `<div class="magazine-date">${dateLabel}</div>` : ''}
            <div class="magazine-filename">${mag.filename}</div>
          </div>
        </div>
        `;
      }).join('');

      // Add click handlers to open PDFs
      document.querySelectorAll('.magazine-card').forEach(card => {
        card.addEventListener('click', async () => {
          const filename = card.dataset.filename;
          const pdfPath = await window.electronAPI.getPdfPath(filename);
          window.electronAPI.openPath(pdfPath);
        });
      });
    }

    async function loadThumbnails(existingThumbnails = new Set()) {
      const containers = document.querySelectorAll('.thumbnail-container');
      let activeGenerations = 0;
      let successCount = 0;
      let errorCount = 0;
      const MAX_CONCURRENT = 3;
      const queue = Array.from(containers);
      const totalCount = queue.length;
      let isComplete = false;
      let skippedCount = 0;

      async function processQueue() {
        while (queue.length > 0 && activeGenerations < MAX_CONCURRENT) {
          const container = queue.shift();
          const canvas = container.querySelector('canvas');
          const filename = canvas.dataset.pdf;
          const thumbnailName = filename.replace(/\.[^/.]+$/, ''); // Remove extension
          
          // Skip if thumbnail already exists
          if (existingThumbnails.has(thumbnailName)) {
            skippedCount++;
            // Just load the existing thumbnail from cache
            try {
              const cached = await window.electronAPI.getThumbnailPath(filename);
              if (cached && cached.exists && cached.path) {
                const img = document.createElement('img');
                img.style.position = 'absolute';
                img.style.top = '0';
                img.style.left = '0';
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'contain';
                img.src = `file://${cached.path}`;
                container.replaceChild(img, canvas);
                container.querySelector('.thumbnail-placeholder').style.display = 'none';
                successCount++;
              }
            } catch (err) {
              console.error('Error loading cached thumbnail:', err);
            }
            
            // Update status after each thumbnail
            updateThumbnailStatus(successCount, errorCount, totalCount, skippedCount);
            
            // Check if all done
            if (queue.length === 0 && activeGenerations === 0 && !isComplete) {
              isComplete = true;
              // After 5 seconds, clear thumbnail status line
              setTimeout(() => {
                elements.thumbStatus.textContent = '';
              }, 5000);
            } else {
              processQueue(); // Continue processing
            }
            continue;
          }
          
          activeGenerations++;
          
          try {
            const result = await renderThumbnail(container);
            if (result.success) {
              successCount++;
            } else {
              errorCount++;
            }
          } catch (err) {
            console.error('Thumbnail render error:', err);
            errorCount++;
          } finally {
            // Update status after each thumbnail
            updateThumbnailStatus(successCount, errorCount, totalCount, skippedCount);
            activeGenerations--;
            
            // Check if all done
            if (queue.length === 0 && activeGenerations === 0 && !isComplete) {
              isComplete = true;
              // After 5 seconds, clear thumbnail status line
              setTimeout(() => {
                elements.thumbStatus.textContent = '';
              }, 5000);
            } else {
              processQueue(); // Continue processing
            }
          }
        }
      }

      function updateThumbnailStatus(success, errors, total, skipped) {
        let statusText = `Generating thumbnails... ${success}/${total}`;
        if (skipped > 0) {
          statusText += ` (${skipped} cached)`;
        }
        if (errors > 0) {
          statusText += ` (${errors} errors)`;
        }
        elements.thumbStatus.textContent = statusText;
      }

      // Start processing immediately
      processQueue();
    }

    // Helper to detect if canvas has actual content (not blank white)
    function canvasHasContent(canvas) {
      const ctx = canvas.getContext('2d');
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      
      // Check if canvas has any non-white pixels
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        const a = data[i + 3];
        
        // If any pixel is not pure white (or transparent), canvas has content
        if (!(r === 255 && g === 255 && b === 255) || a < 255) {
          return true;
        }
      }
      return false;
    }

    async function renderThumbnail(container) {
      const canvas = container.querySelector('canvas');
      const filename = canvas.dataset.pdf;
      let pdf = null;

      // First try to use cached thumbnail
      const cached = await window.electronAPI.getThumbnailPath(filename);
      if (cached && cached.exists && cached.path) {
        const img = document.createElement('img');
        img.style.position = 'absolute';
        img.style.top = '0';
        img.style.left = '0';
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'contain';
        img.src = `file://${cached.path}`;
        container.replaceChild(img, canvas);
        container.querySelector('.thumbnail-placeholder').style.display = 'none';
        return { success: true };
      }

      try {
        // Render first page to canvas
        const pdfPath = await window.electronAPI.getPdfPath(filename);
        pdf = await pdfjsLib.getDocument(pdfPath).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 1.5 });
        const ctx = canvas.getContext('2d');
        canvas.width = Math.floor(viewport.width);
        canvas.height = Math.floor(viewport.height);
        await page.render({ canvasContext: ctx, viewport }).promise;

        // Check if canvas actually has content before saving
        if (!canvasHasContent(canvas)) {
          console.warn(`Canvas is blank/white for ${filename}, not saving`);
          return { success: false };
        }

        // Save thumbnail as JPEG only if it has content
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        const result = await window.electronAPI.saveThumbnail({ filename, dataUrl });
        
        if (result.ok) {
          // Replace canvas with img element to display the saved thumbnail
          const img = document.createElement('img');
          img.style.position = 'absolute';
          img.style.top = '0';
          img.style.left = '0';
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'contain';
          img.src = `file://${result.path}`;
          container.replaceChild(img, canvas);
          container.querySelector('.thumbnail-placeholder').style.display = 'none';
          return { success: true };
        } else {
          console.error(`Failed to save thumbnail for ${filename}:`, result.error);
          return { success: false };
        }
      } catch (err) {
        console.error(`Error generating thumbnail for ${filename}:`, err);
        return { success: false };
      } finally {
        // Clean up resources
        try {
          // Destroy the PDF document
          if (pdf) {
            await pdf.destroy();
            pdf = null;
          }
          
          // Clear canvas data if it still exists (not replaced with img)
          if (canvas && canvas.parentNode) {
            const ctx = canvas.getContext('2d');
            if (ctx) {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            canvas.width = 0;
            canvas.height = 0;
          }
        } catch (e) {
          // Ignore cleanup errors
        }
      }
    }

    // Search functionality
    let searchTimeout;
    let searchAbortController = null;
    
    elements.searchInput.addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      // Cancel any in-progress search
      if (searchAbortController) {
        searchAbortController.abort();
      }
      searchTimeout = setTimeout(() => performSearch(e.target.value), 500);
    });

    async function performSearch(query) {
      const searchLower = query.toLowerCase().trim();
      
      if (!searchLower) {
        // Show all magazines
        document.querySelectorAll('.magazine-card').forEach(card => {
          card.classList.remove('hidden');
          const badge = card.querySelector('.content-match');
          if (badge) badge.remove();
        });
        elements.filteredCount.textContent = magazines.length;
        return;
      }

      // First pass: Quick metadata matches (year, month, filename)
      let visibleCount = 0;
      const cards = document.querySelectorAll('.magazine-card');
      const metadataMatches = new Set();
      
      for (const card of cards) {
        const filename = card.dataset.filename;
        const mag = magazines.find(m => m.filename === filename);
        
        // Check filename, year, month (only if present and valid)
        let matches = filename.toLowerCase().includes(searchLower);
        
        if (mag) {
          if (mag.year) {
            matches = matches || String(mag.year).includes(searchLower);
          }
          if (mag.month && mag.year) {
            const monthName = monthNames[mag.month - 1];
            if (monthName) {
              matches = matches || monthName.toLowerCase().includes(searchLower);
            }
          }
          if (mag.day) {
            matches = matches || String(mag.day).includes(searchLower);
          }
        }
        
        if (matches) {
          metadataMatches.add(filename);
          card.classList.remove('hidden');
          visibleCount++;
          // Remove content badge for metadata matches
          const badge = card.querySelector('.content-match');
          if (badge) badge.remove();
        } else {
          card.classList.add('hidden');
        }
      }
      
      elements.filteredCount.textContent = visibleCount;
      
      // Second pass: Search indexed content (instant!)
      if (isIndexingComplete) {
        try {
          // Use FTS5 query - supports phrases, AND/OR, wildcards
          const searchResults = await window.electronAPI.searchIndexedContent(searchLower);
          
          // Show cards that match content
          for (const result of searchResults) {
            if (!metadataMatches.has(result.filename)) {
              const card = Array.from(cards).find(c => c.dataset.filename === result.filename);
              if (card) {
                card.classList.remove('hidden');
                visibleCount++;
                
                // Add content match indicator with snippet
                const info = card.querySelector('.magazine-info');
                const existingBadge = info.querySelector('.content-match');
                if (existingBadge) existingBadge.remove();
                
                const badge = document.createElement('div');
                badge.className = 'content-match';
                badge.innerHTML = `★ ${result.snippet}`;
                badge.title = result.snippet.replace(/<\/?mark>/g, '');
                info.appendChild(badge);
              }
            }
          }
          
          elements.filteredCount.textContent = visibleCount;
        } catch (error) {
          console.error('Search error:', error);
          elements.subtitle.textContent = 'Search error occurred';
        }
      }
    }

    // Initialize
    loadMagazines();
  </script>
</body>
</html>
