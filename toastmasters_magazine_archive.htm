<html>

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=windows-1252">
	<meta name="GENERATOR" content="Microsoft FrontPage 4.0">
	<meta name="ProgId" content="FrontPage.Editor.Document">
	<title>Toastmasters Magazine Archive</title>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
	<style>
		.flex_container {
			display: flex;
			flex-wrap: wrap;
			margin-right: -15px;
			margin-left: -15px;
		}

		.content_box {
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.7);
			background-color: white;
			height: 250px;
			width: 250px;
			display: flex;
			flex-direction: column;
			border-radius: 20px;
			padding: 25px;
			margin: 10px;
			cursor: pointer;
			overflow: hidden;
			text-align: center;
			justify-content: center;
			align-items: center;
			break-inside: avoid;
		}

		.content_box canvas {
			max-width: 200px;
			max-height: 200px;
			object-fit: scale-down;
			margin: 0 auto;
		}

		.content_box p {
			margin-top: 10px;
			font-size: 12px;
			word-break: break-word;
		}

		.loading {
			color: #666;
			font-style: italic;
		}

		.error {
			color: #999;
		}

		@media print {

			.noprint {
				display: none !important;
			}

			.content_box {
				height: 125px;
				width: 125px;
				margin: 5px;
			}

			.content_box canvas {
				max-width: 100px;
				max-height: 100px;
			}
		}
	</style>
</head>

<body>
	<div class="noprint" id="form1">
		<h1>Toastmasters Magazine Archive</h1>
		<p>
			<label for="startYear">Start Year:</label>
			<input type="number" id="startYear" name="startYear" min="1924" max="2026" value="1924" />
			
			<label for="endYear">End Year:</label>
			<input type="number" id="endYear" name="endYear" min="1924" max="2026" value="2026" />
			
			<label for="month">Month:</label>
			<select id="month" name="month">
				<option value="january">January</option>
				<option value="february">February</option>
				<option value="march">March</option>
				<option value="april">April</option>
				<option value="may" selected>May</option>
				<option value="june">June</option>
				<option value="july">July</option>
				<option value="august">August</option>
				<option value="september">September</option>
				<option value="october">October</option>
				<option value="november">November</option>
				<option value="december">December</option>
			</select>
		</p>
		<p><INPUT type="button" value="Load Magazines" onclick="loadMagazines()" /></p>
		<p>Example: <span id="exampleLink"></span></p>
	</div>

	<div class="flex_container" id="pics"></div>

</body>

<script language="JavaScript">
	// Configure PDF.js worker
	pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

	const picsContainer = document.getElementById("pics");
	const exampleLink = document.getElementById("exampleLink");

	function updateExample() {
		const year = document.getElementById("startYear").value;
		const month = document.getElementById("month").value;
		const url = `https://content.toastmasters.org/image/upload/toastmaster-magazine-${month}-${year}.pdf`;
		exampleLink.textContent = url;
	}

	async function renderPDFThumbnail(url, canvas) {
		try {
			const loadingTask = pdfjsLib.getDocument(url);
			const pdf = await loadingTask.promise;
			const page = await pdf.getPage(1);
			
			const viewport = page.getViewport({ scale: 1 });
			const scale = Math.min(200 / viewport.width, 200 / viewport.height);
			const scaledViewport = page.getViewport({ scale: scale });
			
			const context = canvas.getContext('2d');
			canvas.height = scaledViewport.height;
			canvas.width = scaledViewport.width;
			
			await page.render({
				canvasContext: context,
				viewport: scaledViewport
			}).promise;
			
			return true;
		} catch (error) {
			console.error('Error loading PDF:', error);
			return false;
		}
	}

	async function loadMagazines() {
		// Clear all items
		while (picsContainer.firstChild) {
			picsContainer.removeChild(picsContainer.firstChild);
		}

		const startYear = parseInt(document.getElementById("startYear").value);
		const endYear = parseInt(document.getElementById("endYear").value);
		const month = document.getElementById("month").value;

		// Generate URLs for each year in the range
		for (let year = startYear; year <= endYear; year++) {
			const url = `https://content.toastmasters.org/image/upload/toastmaster-magazine-${month}-${year}.pdf`;
			
			const newBox = document.createElement("div");
			newBox.classList.add("content_box");

			const newLink = document.createElement("a");
			newLink.href = url;
			newLink.target = "_blank";

			const canvas = document.createElement("canvas");
			canvas.style.maxWidth = "200px";
			canvas.style.maxHeight = "200px";

			const newPara = document.createElement("p");
			newPara.textContent = `Loading ${month} ${year}...`;
			newPara.classList.add("loading");

			newLink.appendChild(canvas);
			newLink.appendChild(newPara);
			newBox.appendChild(newLink);
			picsContainer.appendChild(newBox);

			// Load PDF asynchronously
			(async function(canvas, para, url, month, year) {
				const success = await renderPDFThumbnail(url, canvas);
				if (success) {
					para.textContent = `${month.charAt(0).toUpperCase() + month.slice(1)} ${year}`;
					para.classList.remove("loading");
				} else {
					para.textContent = `${month.charAt(0).toUpperCase() + month.slice(1)} ${year} - Not Available`;
					para.classList.remove("loading");
					para.classList.add("error");
					canvas.style.display = "none";
				}
			})(canvas, newPara, url, month, year);
		}
	}

	// Initialize example on page load
	updateExample();
	document.getElementById("startYear").addEventListener("input", updateExample);
	document.getElementById("endYear").addEventListener("input", updateExample);
	document.getElementById("month").addEventListener("change", updateExample);
</script>

</html>
